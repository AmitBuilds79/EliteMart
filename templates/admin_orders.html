<!DOCTYPE html>
<html>
<head>
    <title>Manage Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <h1 style="color:red;">TEST TEMPLATE</h1>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">
    <h2 class="text-center">Manage Orders</h2>
</div>

<div class="card-body">

<a href="/admin" class="btn btn-secondary mb-3">
⬅ Back
</a>

<table class="table table-bordered table-hover text-center">

<thead class="table-dark">
<tr>
    <th>Order ID</th>
    <th>Customer</th>
    <th>Total</th>
    <th>Status</th>
    <th>Date</th>
</tr>
</thead>

<tbody>

{% for order in orders %}

<tr>

<td>{{ order.id }}</td>

<td>{{ order.full_name }}</td>

<td>₹{{ order.total }}</td>

<td>

<form method="POST" action="/admin/update_order/{{ order.id }}">

<select name="status" class="form-select">

<option value="Pending"
{% if order.status=="Pending" %}selected{% endif %}>
Pending
</option>

<option value="Shipped"
{% if order.status=="Shipped" %}selected{% endif %}>
Shipped
</option>

<option value="Delivered"
{% if order.status=="Delivered" %}selected{% endif %}>
Delivered
</option>

</select>

<br>

<button type="submit" class="btn btn-success btn-sm">
    Update
</button>

</form>

</td>
<td>{{ order.order_date }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
