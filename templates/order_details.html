{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">Order Details</h2>

    <table class="table table-bordered text-center">
        <thead class="table-dark">
            <tr>
                <th>Image</th>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
            </tr>
        </thead>

        <tbody>
        {% for item in items %}
        <tr>
            <td>
                <img src="{{ url_for('static', filename='images/' + item.image) }}"
                     width="80">
            </td>
            <td>{{ item.product_name }}</td>
            <td>₹{{ item.price }}</td>
            <td>{{ item.quantity }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
